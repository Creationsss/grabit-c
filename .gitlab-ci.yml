default:
  image: debian:trixie-slim
  before_script:
    - apt-get update -qq
    - DEBIAN_FRONTEND=noninteractive apt-get install -qq -y --no-install-recommends
        build-essential pkg-config
        libwayland-dev libwayland-bin
        libcairo2-dev libxkbcommon-dev libmagic-dev
        libcurl4-openssl-dev libjson-c-dev libdbus-1-dev

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

stages:
  - test
  - package
  - release

variables:
  PACKAGE_REGISTRY_URL: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/grabit/${CI_COMMIT_TAG}"

build:
  stage: test
  script:
    - make all
    - ./build/grabit --version
    - make test
  artifacts:
    paths:
      - build/grabit
    expire_in: 1 week

sanitize:
  stage: test
  script:
    - make sanitize
    - ./build-san/grabit --version

fmt-check:
  stage: test
  image: debian:trixie-slim
  before_script:
    - apt-get update -qq
    - DEBIAN_FRONTEND=noninteractive apt-get install -qq -y --no-install-recommends
        make clang-format
  script:
    - make fmt-check

package:linux-x86_64:
  stage: package
  rules:
    - if: $CI_COMMIT_TAG
  dependencies: []
  script:
    - make clean
    - make all VERSION="${CI_COMMIT_TAG#v}" LDFLAGS="-Wl,--strip-all"
    - ./build/grabit --version
    - mv build/grabit grabit-x86_64-linux
    - sha256sum grabit-x86_64-linux | tee grabit-x86_64-linux.sha256
    - ldd grabit-x86_64-linux
  artifacts:
    paths:
      - grabit-x86_64-linux
      - grabit-x86_64-linux.sha256
    expire_in: 1 week

package:upload:
  stage: package
  image: curlimages/curl:latest
  rules:
    - if: $CI_COMMIT_TAG
  needs: ["package:linux-x86_64"]
  before_script: []
  script:
    - |
      curl --fail --header "JOB-TOKEN: $CI_JOB_TOKEN" \
        --upload-file grabit-x86_64-linux \
        "${PACKAGE_REGISTRY_URL}/grabit-x86_64-linux"
    - |
      curl --fail --header "JOB-TOKEN: $CI_JOB_TOKEN" \
        --upload-file grabit-x86_64-linux.sha256 \
        "${PACKAGE_REGISTRY_URL}/grabit-x86_64-linux.sha256"

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: $CI_COMMIT_TAG
  needs: ["package:upload"]
  before_script: []
  script:
    - echo "releasing $CI_COMMIT_TAG"
  release:
    tag_name: $CI_COMMIT_TAG
    description: "$CI_COMMIT_TAG"
    assets:
      links:
        - name: "grabit (x86_64 linux)"
          url: "${PACKAGE_REGISTRY_URL}/grabit-x86_64-linux"
          link_type: package
        - name: "sha256"
          url: "${PACKAGE_REGISTRY_URL}/grabit-x86_64-linux.sha256"
          link_type: other
